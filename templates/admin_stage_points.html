{% extends "base.html" %}

{% block title %}Cấu hình điểm beer{% endblock %}

{% block content %}

<div class="container py-5">

  <div class="mb-4">
    <h1 class="fw-bold mb-1">🍺 Cấu hình điểm beer</h1>
    <p class="text-muted mb-0">
      Admin chỉnh số cốc beer bị tính khi dự đoán sai theo từng vòng.
    </p>
  </div>

  <form method="post">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Vòng đấu</th>
              <th class="text-center">Điểm beer khi sai</th>
            </tr>
          </thead>

          <tbody>
            {% for item in stage_points %}
            <tr>
              <td class="fw-semibold">{{ item.stage }}</td>

              <td style="max-width: 220px;">
                <div class="input-group">
                  <input
                    type="number"
                    class="form-control text-center"
                    name="{{ item.stage }}"
                    value="{{ item.beer_points }}"
                    min="0">
                  <span class="input-group-text">🍺</span>
                </div>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>

    <button class="btn btn-primary rounded-pill px-5 mt-4">
      Lưu cấu hình
    </button>
  </form>

</div>

{% endblock %}
